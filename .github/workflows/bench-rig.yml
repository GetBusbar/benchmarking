name: bench-rig

# Build the bench "rig" — the mock (Rust) + load generator (Go) — for BOTH arches natively, and
# publish them to the rolling `rig` release. The bench boxes then just `curl` the right binary
# (lib/rig.sh), so they need no build toolchain: bare OS + docker is enough. Runs on any change to
# the mock or loadgen sources, and on demand.
on:
  push:
    branches: [main]
    paths: ["mock/**", "loadgen/**", ".github/workflows/bench-rig.yml"]
  workflow_dispatch:

permissions:
  contents: write   # to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: ubuntu-24.04-arm
            goarch: arm64
          - arch: x86
            runner: ubuntu-24.04
            goarch: amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build mock (Rust, native ${{ matrix.arch }})
        run: |
          cargo build --release --manifest-path mock/Cargo.toml
          cp mock/target/release/mock "mock-${{ matrix.arch }}"

      - name: Build loadgen (Go, ${{ matrix.arch }})
        run: |
          GOOS=linux GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -ldflags="-s -w" \
            -o "ugen-${{ matrix.arch }}" loadgen/ugen.go

      - name: Publish to the rolling `rig` release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view rig >/dev/null 2>&1 || \
            gh release create rig --title "bench-rig binaries (rolling latest)" \
              --notes "Prebuilt mock (Rust) + loadgen (Go) for the bench boxes. Rebuilt by bench-rig.yml."
          gh release upload rig --clobber "mock-${{ matrix.arch }}" "ugen-${{ matrix.arch }}"
