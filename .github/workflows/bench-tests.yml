# Enforced gate for the sweep engine (lib/sweep.sh) — the component that produces EVERY published
# throughput number. Runs lib/sweep_peak_test.sh on push, so a change that re-quantises fast gateways
# onto doubling rungs (the exact off-by-one class the test guards, incl. the H5 relative-TOL fix) or
# regresses the adaptive/prior-seeded path (M5) or the sweep_c1 honesty gate (M6) fails CI instead of
# shipping silently (audit H6). Fast (stubbed loadgen/rig, no network, seconds).
name: bench-tests

on:
  push:
    paths:
      - "lib/sweep.sh"
      - "lib/sweep_peak_test.sh"
      - "lib/stream_measure.sh"
      - "lib/stream_measure_test.sh"
      - "lib/promote_guard.py"
      - "lib/promote_guard_test.py"
      - "loadgen/**"
      - "mock/**"
      - ".github/workflows/bench-tests.yml"
  pull_request:
    paths:
      - "lib/sweep.sh"
      - "lib/sweep_peak_test.sh"
      - "lib/stream_measure.sh"
      - "lib/stream_measure_test.sh"
      - "lib/promote_guard.py"
      - "lib/promote_guard_test.py"
      - "loadgen/**"
      - "mock/**"
      - ".github/workflows/bench-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  peak-search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Parse-check the sweep + stream-measure shell files
        run: bash -n lib/sweep.sh && bash -n lib/sweep_peak_test.sh && bash -n lib/stream_measure.sh && bash -n lib/stream_measure_test.sh
      - name: Peak-search regression test (H5) + adaptive/prior (M5) + sweep_c1 (M6)
        run: bash lib/sweep_peak_test.sh
      # lib/stream_measure.sh produces EVERY published streams_sustained / cpu_fps / added-TTFT number but
      # had ZERO CI coverage (MEDIUM-R2-4): the sustained/cpu-fps bisect+peak searches, the sustained
      # SM_MOCK_BOUND decision (the MEDIUM-R2-2 gate's source signal), stream_c1's added-latency honesty
      # gate, and the dead-mock stream_mock_ready path. Gate it so a sign inversion / inverted mock-bound
      # comparison / false-over-a-dead-reference can never ship silently.
      - name: Stream-measure regression test (sustained/cpu-fps search + mock-bound + stream_c1 + dead-mock)
        run: bash lib/stream_measure_test.sh
      # lib/promote_guard.py decides whether an incoming result may overwrite the committed one; a bug
      # there republishes a regression as an honest failure (R4-M2). Covers MEDIUM-R2-3 (matrix all-dead
      # 000 detection) + the anchored-marker / status-000 / honest-not-served behaviours.
      - name: Promote-guard regression test (matrix all-dead 000 + anchored marker + honest not-served)
        run: python3 lib/promote_guard_test.py
      - uses: actions/setup-go@v5
        with:
          go-version-file: loadgen/go.mod
      # ugen's rps/p99/delivered ARE every published board number, but had zero unit tests and CI only
      # parse-checked the sweep's CONSUMPTION of the number, never ugen's COMPUTATION (audit R3-H2).
      # Gate the numeric core: rps-over-elapsed (R2-M1), pct() + its clamp (N2), the NewRequest-error
      # path (L1), isContent's empty-placeholder handling. loadgen is a self-contained stdlib module.
      - name: loadgen vet
        run: go vet -C loadgen ./...
      - name: loadgen unit tests (rps/pct/isContent/buildRequest)
        run: go test -C loadgen ./...

  mock-shape:
    # The mock must never bottleneck and must serve every dialect identically; its per-dialect
    # request_shape_ok is what the matrix's leg-3 body_ok trusts. Gate it so the bedrock/cohere
    # tightening (R3-M6 — reject an unconverted OpenAI body) can never silently regress.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: mock unit tests (request_shape_ok per dialect + routing)
        run: cargo test --manifest-path mock/Cargo.toml --tests
