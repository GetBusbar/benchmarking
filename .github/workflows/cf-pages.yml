# Deploy the results site to Cloudflare Pages (onthebench.ai).
#
# Replaces the GitHub Pages workflow (pages.yml). Once this is confirmed green
# and the nameserver cutover to Cloudflare is complete, pages.yml can be deleted.
#
# This deploy is SELF-SUFFICIENT on charts: gen-data.mjs emits the canonical site/data.json,
# charts.py regenerates the PNGs FROM that canonical data (+ results/*.json for the non-perf
# suites), then gen-data.mjs runs again to copy the fresh PNGs + fonts into site/. So a plain
# `results/` commit always deploys fresh, mutually consistent charts + data in one shot - no
# dependency on render-charts.yml's timing (whose regenerated-PNG commit carries [skip ci] and
# would otherwise leave the deployed charts a push behind).
#
# gen-data.mjs scans gateways/*/gateway.sh + results/**/*.json, copies the chart
# PNGs and bundled fonts into site/, and the finished site/ directory is the
# artifact that wrangler uploads to Cloudflare Pages.
#
# Requires two repo secrets (Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   token with Pages:Edit on the account
#   CLOUDFLARE_ACCOUNT_ID  91612b184a379a695266d84761cbee8f
name: cf-pages

on:
  push:
    branches: [main]
    paths:
      - "results/**"
      - "gateways/**"
      - "site/**"
      - ".github/workflows/cf-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cf-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ORDER MATTERS (single canonical source): gen-data.mjs FIRST emits site/data.json, the
      # canonical per-gateway passthrough/translation records (matrix per-cell sweep, with
      # perf/xlate-suite fallback). charts.py then READS that bundle, so every PNG shows exactly
      # the numbers the site table ranks. The second gen-data pass copies the fresh PNGs into
      # site/charts/ and re-stamps data.json; both artifacts come from the one results tree in
      # this same checkout, so they can never diverge. The consistency guard (site/test.mjs)
      # fails the deploy if any surface would resolve a metric to a different value.
      - name: Generate canonical site data
        run: node site/gen-data.mjs
      - name: Regenerate charts from the canonical data
        run: |
          python3 -m pip install --quiet matplotlib
          python3 charts.py
      - name: Refresh site data + copy fresh chart PNGs
        run: node site/gen-data.mjs
      - name: Consistency guard (table == drawer == compare == charts)
        run: node site/test.mjs
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy site --project-name=onthebench --branch=main
